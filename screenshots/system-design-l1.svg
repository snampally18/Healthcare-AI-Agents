<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <title>Healthcare AI Multi-Agent System Design</title>
  <rect width="900" height="620" fill="#0f1f35"/>
  <text x="450" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Healthcare AI — Multi-Agent System Design</text>

  <text x="50" y="68" fill="#64748b" font-size="11" font-weight="700" letter-spacing="1">ROLE-BASED ACCESS</text>
  <rect x="50" y="78" width="150" height="54" rx="10" fill="#0c2a3a" stroke="#0891b2" stroke-width="1.5"/>
  <text x="125" y="100" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">🖥️ Patient Kiosk</text>
  <text x="125" y="118" text-anchor="middle" fill="#64748b" font-size="10">Self check-in only</text>
  <rect x="220" y="78" width="150" height="54" rx="10" fill="#0c2a1a" stroke="#27ae60" stroke-width="1.5"/>
  <text x="295" y="100" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">👩‍⚕️ Nurse</text>
  <text x="295" y="118" text-anchor="middle" fill="#64748b" font-size="10">Room assignment only</text>
  <rect x="390" y="78" width="150" height="54" rx="10" fill="#2a1a0a" stroke="#e67e22" stroke-width="1.5"/>
  <text x="465" y="100" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">🩺 Doctor</text>
  <text x="465" y="118" text-anchor="middle" fill="#64748b" font-size="10">Clinical notes only</text>
  <rect x="560" y="78" width="150" height="54" rx="10" fill="#1e0a3a" stroke="#7e22ce" stroke-width="1.5"/>
  <text x="635" y="100" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">🔐 Admin</text>
  <text x="635" y="118" text-anchor="middle" fill="#64748b" font-size="10">Full visibility</text>
  <rect x="730" y="78" width="130" height="54" rx="10" fill="#1e2d40" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="795" y="97" text-anchor="middle" fill="#fde047" font-size="11" font-weight="700">Role Selector</text>
  <text x="795" y="112" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Dashboard</text>
  <text x="795" y="126" text-anchor="middle" fill="#64748b" font-size="9">localhost:5000</text>

  <line x1="450" y1="132" x2="450" y2="163" stroke="#2c4a6e" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="50" y="160" fill="#64748b" font-size="11" font-weight="700" letter-spacing="1">AGENTS</text>
  <rect x="50" y="170" width="175" height="80" rx="10" fill="#0c2a3a" stroke="#0891b2" stroke-width="2"/>
  <text x="137" y="193" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">Agent 1 — Check-In</text>
  <text x="137" y="209" text-anchor="middle" fill="#64748b" font-size="10">checkin_app.py · :5000</text>
  <text x="137" y="225" text-anchor="middle" fill="#94a3b8" font-size="10">Validate fields · Save to DB</text>
  <text x="137" y="239" text-anchor="middle" fill="#94a3b8" font-size="10">Claude AI validation</text>
  <rect x="250" y="170" width="175" height="80" rx="10" fill="#0c2a1a" stroke="#27ae60" stroke-width="2"/>
  <text x="337" y="193" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">Agent 2 — Nurse</text>
  <text x="337" y="209" text-anchor="middle" fill="#64748b" font-size="10">nurse_agent.py · :5001</text>
  <text x="337" y="225" text-anchor="middle" fill="#94a3b8" font-size="10">Room assign · Wait time</text>
  <text x="337" y="239" text-anchor="middle" fill="#94a3b8" font-size="10">Claude AI room suggestion</text>
  <rect x="450" y="170" width="175" height="80" rx="10" fill="#2a1a0a" stroke="#e67e22" stroke-width="2"/>
  <text x="537" y="193" text-anchor="middle" fill="#fdba74" font-size="12" font-weight="700">Agent 3 — Doctor</text>
  <text x="537" y="209" text-anchor="middle" fill="#64748b" font-size="10">doctor_agent.py · :5002</text>
  <text x="537" y="225" text-anchor="middle" fill="#94a3b8" font-size="10">Clinical notes · Summary</text>
  <text x="537" y="239" text-anchor="middle" fill="#94a3b8" font-size="10">Claude AI note generation</text>
  <rect x="650" y="170" width="175" height="80" rx="10" fill="#1a0a2a" stroke="#a855f7" stroke-width="2"/>
  <text x="737" y="193" text-anchor="middle" fill="#d8b4fe" font-size="12" font-weight="700">Agent 4 — Summary</text>
  <text x="737" y="209" text-anchor="middle" fill="#64748b" font-size="10">summary_agent.py · :5003</text>
  <text x="737" y="225" text-anchor="middle" fill="#94a3b8" font-size="10">Patient-friendly summary</text>
  <text x="737" y="239" text-anchor="middle" fill="#94a3b8" font-size="10">Email or Print delivery</text>

  <line x1="137" y1="250" x2="137" y2="315" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <line x1="337" y1="250" x2="337" y2="315" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="537" y1="250" x2="537" y2="315" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <line x1="737" y1="250" x2="737" y2="315" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <rect x="50" y="320" width="760" height="60" rx="10" fill="#1a1a2e" stroke="#3b4a6e" stroke-width="2"/>
  <text x="430" y="345" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="700">🗄 SQLite Database — checkins.db</text>
  <text x="430" y="365" text-anchor="middle" fill="#64748b" font-size="10">Shared across all 4 agents · patient info · room status · clinical notes · visit summary</text>

  <line x1="315" y1="380" x2="315" y2="425" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrYellow)"/>
  <line x1="585" y1="380" x2="585" y2="425" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrGreen2)"/>

  <rect x="200" y="430" width="230" height="60" rx="10" fill="#1a1500" stroke="#eab308" stroke-width="2"/>
  <text x="315" y="455" text-anchor="middle" fill="#fde047" font-size="13" font-weight="700">🤖 Claude AI (Anthropic)</text>
  <text x="315" y="473" text-anchor="middle" fill="#64748b" font-size="10">claude-sonnet-4-6 · Anthropic API</text>

  <rect x="470" y="430" width="230" height="60" rx="10" fill="#0a1a0a" stroke="#22c55e" stroke-width="2"/>
  <text x="585" y="455" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">📧 Mailtrap SMTP</text>
  <text x="585" y="473" text-anchor="middle" fill="#64748b" font-size="10">Email sandbox · After Visit Summary</text>

  <text x="50" y="523" fill="#64748b" font-size="11" font-weight="700" letter-spacing="1">ADDITIONAL FEATURES</text>
  <rect x="50" y="533" width="260" height="50" rx="8" fill="#1e2d40" stroke="#2c4a6e" stroke-width="1"/>
  <text x="180" y="554" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">🔍 Search Records</text>
  <text x="180" y="572" text-anchor="middle" fill="#64748b" font-size="10">Filter by name · doctor · phone · DOB</text>
  <rect x="325" y="533" width="260" height="50" rx="8" fill="#1e2d40" stroke="#2c4a6e" stroke-width="1"/>
  <text x="455" y="554" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">⏱ Wait Time Tracker</text>
  <text x="455" y="572" text-anchor="middle" fill="#64748b" font-size="10">Color-coded urgency per patient</text>
  <rect x="600" y="533" width="210" height="50" rx="8" fill="#1e2d40" stroke="#2c4a6e" stroke-width="1"/>
  <text x="705" y="554" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="600">📊 Daily Report</text>
  <text x="705" y="572" text-anchor="middle" fill="#64748b" font-size="10">Stats · Avg time · By doctor</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2c4a6e"/></marker>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0891b2"/></marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/></marker>
    <marker id="arrYellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#eab308"/></marker>
    <marker id="arrGreen2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/></marker>
  </defs>
</svg>
