<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">
  <title>Healthcare AI — API &amp; Service Layer</title>
  <rect width="960" height="700" fill="#0f1f35"/>
  <text x="480" y="34" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">Level 2 — API &amp; Service Layer</text>

  <rect x="30" y="55" width="210" height="290" rx="12" fill="#0c2a3a" stroke="#0891b2" stroke-width="2"/>
  <text x="135" y="78" text-anchor="middle" fill="#7dd3fc" font-size="13" font-weight="700">Agent 1 — Check-In</text>
  <text x="135" y="94" text-anchor="middle" fill="#64748b" font-size="10">Port 5000</text>
  <rect x="45" y="105" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="75" y="122" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="100" y="122" fill="#93c5fd" font-size="10">/</text><text x="115" y="122" fill="#64748b" font-size="10">Dashboard</text>
  <rect x="45" y="137" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="75" y="154" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="100" y="154" fill="#93c5fd" font-size="10">/checkin</text><text x="160" y="154" fill="#64748b" font-size="10">Form</text>
  <rect x="45" y="169" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="72" y="186" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="105" y="186" fill="#93c5fd" font-size="10">/submit</text><text x="160" y="186" fill="#64748b" font-size="10">Save</text>
  <rect x="45" y="201" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="72" y="218" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="105" y="218" fill="#93c5fd" font-size="10">/done</text><text x="150" y="218" fill="#64748b" font-size="10">Confirm</text>
  <rect x="45" y="233" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="75" y="250" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="100" y="250" fill="#93c5fd" font-size="10">/records</text><text x="158" y="250" fill="#64748b" font-size="10">Search</text>
  <rect x="45" y="265" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="75" y="282" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="100" y="282" fill="#93c5fd" font-size="10">/daily-report</text>
  <rect x="45" y="297" width="180" height="26" rx="6" fill="#0f3a50" stroke="#0891b2" stroke-width="1"/>
  <text x="72" y="314" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="105" y="314" fill="#93c5fd" font-size="10">/validate</text><text x="162" y="314" fill="#64748b" font-size="10">Claude AI</text>
  <text x="135" y="340" text-anchor="middle" fill="#64748b" font-size="9">Flask · Python</text>

  <rect x="260" y="55" width="210" height="290" rx="12" fill="#0c2a1a" stroke="#27ae60" stroke-width="2"/>
  <text x="365" y="78" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">Agent 2 — Nurse</text>
  <text x="365" y="94" text-anchor="middle" fill="#64748b" font-size="10">Port 5001</text>
  <rect x="275" y="105" width="180" height="26" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
  <text x="305" y="122" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="330" y="122" fill="#86efac" font-size="10">/nurse</text><text x="380" y="122" fill="#64748b" font-size="10">Staff Panel</text>
  <rect x="275" y="137" width="180" height="26" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
  <text x="305" y="154" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="330" y="154" fill="#86efac" font-size="10">/display</text><text x="383" y="154" fill="#64748b" font-size="10">Waiting Room</text>
  <rect x="275" y="169" width="180" height="26" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
  <text x="302" y="186" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="335" y="186" fill="#86efac" font-size="10">/nurse/assign</text>
  <rect x="275" y="201" width="180" height="26" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
  <text x="302" y="218" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="335" y="218" fill="#86efac" font-size="10">/nurse/release</text>
  <rect x="275" y="233" width="180" height="26" rx="6" fill="#0a2a1a" stroke="#27ae60" stroke-width="1"/>
  <text x="302" y="250" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="335" y="250" fill="#86efac" font-size="10">/nurse/suggest</text>
  <text x="365" y="290" text-anchor="middle" fill="#fbbf24" font-size="9">Claude AI room suggestion</text>
  <text x="365" y="340" text-anchor="middle" fill="#64748b" font-size="9">Flask · Python</text>

  <rect x="490" y="55" width="210" height="290" rx="12" fill="#2a1a0a" stroke="#e67e22" stroke-width="2"/>
  <text x="595" y="78" text-anchor="middle" fill="#fdba74" font-size="13" font-weight="700">Agent 3 — Doctor</text>
  <text x="595" y="94" text-anchor="middle" fill="#64748b" font-size="10">Port 5002</text>
  <rect x="505" y="105" width="180" height="26" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
  <text x="535" y="122" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="560" y="122" fill="#fdba74" font-size="10">/doctor</text><text x="610" y="122" fill="#64748b" font-size="10">Notes Panel</text>
  <rect x="505" y="137" width="180" height="26" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
  <text x="532" y="154" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="565" y="154" fill="#fdba74" font-size="10">/doctor/generate</text>
  <rect x="505" y="169" width="180" height="26" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
  <text x="532" y="186" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="565" y="186" fill="#fdba74" font-size="10">/doctor/save</text>
  <rect x="505" y="201" width="180" height="26" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
  <text x="532" y="218" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="565" y="218" fill="#fdba74" font-size="10">/doctor/gen-summary</text>
  <rect x="505" y="233" width="180" height="26" rx="6" fill="#2a1500" stroke="#e67e22" stroke-width="1"/>
  <text x="532" y="250" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="565" y="250" fill="#fdba74" font-size="10">/doctor/send-email</text>
  <text x="595" y="290" text-anchor="middle" fill="#fbbf24" font-size="9">Claude AI notes + summary</text>
  <text x="595" y="340" text-anchor="middle" fill="#64748b" font-size="9">Flask · Python</text>

  <rect x="720" y="55" width="210" height="290" rx="12" fill="#1a0a2a" stroke="#a855f7" stroke-width="2"/>
  <text x="825" y="78" text-anchor="middle" fill="#d8b4fe" font-size="13" font-weight="700">Agent 4 — Summary</text>
  <text x="825" y="94" text-anchor="middle" fill="#64748b" font-size="10">Port 5003</text>
  <rect x="735" y="105" width="180" height="26" rx="6" fill="#1a0a2a" stroke="#a855f7" stroke-width="1"/>
  <text x="765" y="122" fill="#fde047" font-size="10" font-weight="700">GET</text><text x="790" y="122" fill="#d8b4fe" font-size="10">/summary</text><text x="848" y="122" fill="#64748b" font-size="10">Page</text>
  <rect x="735" y="137" width="180" height="26" rx="6" fill="#1a0a2a" stroke="#a855f7" stroke-width="1"/>
  <text x="762" y="154" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="795" y="154" fill="#d8b4fe" font-size="10">/summary/generate</text>
  <rect x="735" y="169" width="180" height="26" rx="6" fill="#1a0a2a" stroke="#a855f7" stroke-width="1"/>
  <text x="762" y="186" fill="#22c55e" font-size="10" font-weight="700">POST</text><text x="795" y="186" fill="#d8b4fe" font-size="10">/summary/send-email</text>
  <text x="825" y="290" text-anchor="middle" fill="#fbbf24" font-size="9">Claude AI · Mailtrap SMTP</text>
  <text x="825" y="340" text-anchor="middle" fill="#64748b" font-size="9">Flask · Python</text>

  <line x1="135" y1="345" x2="135" y2="368" stroke="#0891b2" stroke-width="1.5" marker-end="url(#arrBlue)"/>
  <line x1="365" y1="345" x2="365" y2="368" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrGreen)"/>
  <line x1="595" y1="345" x2="595" y2="368" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrOrange)"/>
  <line x1="825" y1="345" x2="825" y2="368" stroke="#a855f7" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <rect x="30" y="370" width="900" height="55" rx="10" fill="#1a1a2e" stroke="#3b4a6e" stroke-width="2"/>
  <text x="480" y="393" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="700">🗄 SQLite Database — checkins.db (Shared)</text>
  <text x="480" y="412" text-anchor="middle" fill="#64748b" font-size="10">All agents READ and WRITE to the same database — no inter-agent HTTP calls needed</text>

  <text x="30" y="450" fill="#64748b" font-size="11" font-weight="700" letter-spacing="1">EXTERNAL SERVICES</text>
  <rect x="30" y="460" width="280" height="55" rx="10" fill="#1a1500" stroke="#eab308" stroke-width="2"/>
  <text x="170" y="483" text-anchor="middle" fill="#fde047" font-size="12" font-weight="700">🤖 Anthropic API</text>
  <text x="170" y="500" text-anchor="middle" fill="#64748b" font-size="10">claude-sonnet-4-6 · REST API · ANTHROPIC_API_KEY</text>
  <rect x="330" y="460" width="280" height="55" rx="10" fill="#0a1a0a" stroke="#22c55e" stroke-width="2"/>
  <text x="470" y="483" text-anchor="middle" fill="#86efac" font-size="12" font-weight="700">📧 Mailtrap SMTP</text>
  <text x="470" y="500" text-anchor="middle" fill="#64748b" font-size="10">sandbox.smtp.mailtrap.io · Port 2525</text>
  <rect x="630" y="460" width="300" height="55" rx="10" fill="#1a1a2e" stroke="#3b4a6e" stroke-width="2"/>
  <text x="780" y="483" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">🔐 .env File</text>
  <text x="780" y="500" text-anchor="middle" fill="#64748b" font-size="10">ANTHROPIC_API_KEY · SMTP credentials · Never on GitHub</text>

  <rect x="30" y="540" width="900" height="130" rx="10" fill="#111e30" stroke="#2c4a6e" stroke-width="1.5"/>
  <text x="480" y="562" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="700">Data Flow Summary</text>
  <text x="50" y="585" fill="#94a3b8" font-size="11">1.</text><text x="65" y="585" fill="#e2e8f0" font-size="11">Patient submits check-in form → POST /submit → Claude validates → Saved to checkins.db</text>
  <text x="50" y="605" fill="#94a3b8" font-size="11">2.</text><text x="65" y="605" fill="#e2e8f0" font-size="11">Nurse opens /nurse → Reads waiting patients from DB → POST /nurse/assign → DB updated</text>
  <text x="50" y="625" fill="#94a3b8" font-size="11">3.</text><text x="65" y="625" fill="#e2e8f0" font-size="11">Doctor opens /doctor → POST /doctor/generate → Claude structures notes → POST /doctor/save → DB</text>
  <text x="50" y="645" fill="#94a3b8" font-size="11">4.</text><text x="65" y="645" fill="#e2e8f0" font-size="11">Doctor clicks Send Email → POST /doctor/send-email → Mailtrap SMTP → Patient inbox</text>

  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#0891b2"/></marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#27ae60"/></marker>
    <marker id="arrOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#e67e22"/></marker>
    <marker id="arrPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#a855f7"/></marker>
  </defs>
</svg>
